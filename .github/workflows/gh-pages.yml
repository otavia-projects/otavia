name: GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COURSIER_REPOSITORIES: central|https://s01.oss.sonatype.org/content/repositories/snapshots|jitpack|https://corporate.com/repo

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      # Use Node.js 20 LTS for compatibility
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - run: chmod +x mill

      # Generate Scaladoc API documentation
      - name: Generate API Documentation
        run: |
          ./mill docs.docJar
          rm -rf website/static/api
          cp -r out/docs/docJar.dest/api website/static/api/

      # Install npm dependencies
      - name: Install Dependencies
        run: cd website && npm ci

      # Build Docusaurus site
      - name: Build Website
        run: cd website && npm run build

      # Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
